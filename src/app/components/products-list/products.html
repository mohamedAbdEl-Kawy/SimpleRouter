<div class="container mt-5">
  <div class="row justify-content-center g-4">
    @if (!products.length) {
    <div class="col-12 text-center">
      <p class="text-muted fs-5">No products available.</p>
    </div>
    }
    @else {
    @for (product of products; track $index) {
    <div class="col-sm-6 col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm rounded-4 border-0">
        <img [src]="product.imgURL" class="card-img-top img-fluid rounded-top" alt="{{ product.name }}">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold">{{ product.name }}</h5>
          <p class="card-text text-muted flex-grow-1">{{ product.desc }}</p>
          <h6 class="text-primary fw-semibold mb-0">${{ product.price }}</h6>
        </div>
      </div>
    </div>
    }
    }
  </div>
</div>
